# Text templates written into the user-facing files (CLAUDE.md,
# copilot-instructions.md, AGENTS.md entries, .claudeignore/.copilotignore).
# Edit the wording here — no code change needed.
#
# {{PLACEHOLDERS}} are substituted by llm_cli/services/instructions.py:
#   {{IGNORE_FILE}}          tool ignore file name (.claudeignore / .copilotignore)
#   {{CACHE_FILE}}           absolute path of the generated context cache
#   {{PROJECT_PATH}}         absolute path of the indexed project
#   {{RUN}}                  how to invoke llm_cli (python ~/.llm_cli/run.py)
#   {{TOOL_NAME}}            claude | copilot
#   {{INSTRUCTIONS_GLOBAL}}  absolute path of the tool's global instructions file

# gitignore-style exclusion list for the context indexer.
ignore_file: |
  # {{IGNORE_FILE}} — files excluded from the context index (gitignore-style)

  # Hidden files and directories
  .*
  !{{IGNORE_FILE}}
  !.gitignore
  !.env.example

  # Dependencies
  node_modules/
  vendor/
  .venv/
  venv/
  env/
  site-packages/

  # Build and dist
  dist/
  build/
  out/
  target/
  __pycache__/
  *.pyc
  *.class
  *.o
  *.a
  *.so
  *.dll
  *.exe

  # Generated and minified assets
  *.min.js
  *.min.css
  *.bundle.js
  *.map

  # Locks
  package-lock.json
  yarn.lock
  pnpm-lock.yaml
  poetry.lock
  Pipfile.lock
  Cargo.lock
  composer.lock
  Gemfile.lock

  # Logs and coverage
  *.log
  logs/
  *.out
  coverage/
  htmlcov/
  lcov.info

  # IDE and OS
  .idea/
  .vscode/
  *.swp
  .DS_Store
  Thumbs.db

  # Certificates and secrets
  *.pem
  *.key
  *.cert
  *.p12
  *.pfx
  *.jks

  # Archives, binaries and media
  *.zip
  *.tar
  *.tar.gz
  *.rar
  *.7z
  *.jar
  *.war
  *.bin
  *.dat
  *.db
  *.sqlite
  *.sqlite3
  *.png
  *.jpg
  *.jpeg
  *.gif
  *.ico
  *.svg
  *.webp
  *.mp4
  *.mp3
  *.pdf

# Pointer entry injected into the project-local instructions file
# (CLAUDE.md / AGENTS.md). Its first line is the marker used to find
# and replace the section — keep it stable.
index_entry: |
  # Project context index
  `{{CACHE_FILE}}` is a pre-generated symbol index of {{PROJECT_PATH}} (one line per file: path | LOC | symbols).
  Read it before exploring the tree, then open only the relevant files.
  It refreshes automatically (hooks + launch); files absent from it are excluded by {{IGNORE_FILE}} or don't exist yet.
  Manual rebuild after large structural changes: {{RUN}} setup-context-cache {{PROJECT_PATH}} --tool {{TOOL_NAME}}
  Global rules: see {{INSTRUCTIONS_GLOBAL}}

# Shared behavioral core — loaded into context on every turn of every session,
# so it carries only imperative, non-derivable rules: anything the model does
# natively (naming, structure, tool discovery) is deliberately absent.
global_rules: |
  # Rules
  - Code, comments, commit messages and docs: English only, no emojis.
  - Follow the existing codebase conventions; when in doubt, mirror the closest similar file.
  - KISS : Keep It Simply Simple.
  - SOLID : single responsibility per function, class and module; keep functions short — split rather than grow.
  - Naming convention: snake_case for function, camelCase for method, PascalCase for class and UPPER_CASE for const.
  - No code duplication : use shared files when it make sense.
  - No magic number in code : use shared const file or config files.
  - Keep the tree clean: create new folders, files and classes freely instead of crowding existing ones.
  - Before a multi-file refactor: present a short plan and wait for confirmation.
  - Never delete files or overwrite uncommitted changes without explicit user confirmation.

  # Commits & PRs
  - Commit: `[branch_name] short imperative description`. Branch: `feature/branch_name-short-description`.
  - NEVER `git push` without explicit user confirmation. Force push is forbidden.
  - NEVER push on master without a peered PR. Always make a new branch and ask for a merge.

  # Security
  All code and data are confidential.
  Credentials, tokens, API keys, PII: env vars or secret managers only — never in code, logs, commits or docs.
  Internal company URLs must not appear in public code or external-facing documentation.

  # CLI output compression (RTK)
  Prefix shell commands with `rtk` when available — `rtk git status`, `rtk git diff`, `rtk grep`, `rtk ls`, `rtk read <file>` — it compresses output before it reaches context.
  Fall back to the plain command if rtk fails.

  # Maintenance ({{RUN}} ...)
  Repair commands when the environment looks broken or out of date:
  - setup-env --tool {{TOOL_NAME}} — full repair (sync, instructions, hooks)
  - setup-context-cache [path] — rebuild the project symbol index (-u to remove)
  - setup-mcp — register the Atlassian/Bitbucket MCP servers (-u to remove)
  - check {{TOOL_NAME}} [path] — diagnose the setup

# Per-tool tail appended to the shared behavioral core (separated by one
# blank line). Copilot has no hook system, so RTK usage must be
# instruction-driven — claude gets it transparently through the PreToolUse
# hook and needs no extra text.
tool_extra:
  claude: ""
  copilot: |
    # CLI output compression (RTK)
    Prefix shell commands with `rtk` when available — `rtk git status`, `rtk git diff`, `rtk grep`,
    `rtk ls`, `rtk read <file>` — it compresses output before it reaches context.
    Fall back to the plain command if rtk fails.
